# fly.toml — TenderRadar on Fly.io
# Docs: https://fly.io/docs/reference/configuration/

app = "tenderradar"        # change to your app name after: fly launch
primary_region = "cdg"    # Paris — closest to Switzerland

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true   # scale to zero when idle — saves money
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
